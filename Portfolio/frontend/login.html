<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Sudhanshu Kumar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-gradient-to-br from-blue-900 via-purple-900 to-slate-900 min-h-screen text-white font-sans flex items-center justify-center p-6">

    <div class="w-full max-w-md bg-black bg-opacity-40 p-8 rounded-2xl shadow-2xl backdrop-blur-md border border-purple-500/30 animate__animated animate__fadeInUp">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-wider mb-2">
                ADMIN <span class="text-purple-400">LOGIN</span>
            </h1>
            <p class="text-gray-400 text-sm">Access your X-Beast dashboard</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div class="relative">
                <label for="username" class="sr-only">Username</label>
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fa-solid fa-user text-purple-400"></i>
                </div>
                <input type="text" id="username" name="username" required
                    class="block w-full pl-10 pr-3 py-3 border border-purple-500/30 rounded-lg bg-white bg-opacity-5 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-colors"
                    placeholder="Username or Email">
            </div>

            <div class="relative">
                <label for="password" class="sr-only">Password</label>
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fa-solid fa-lock text-purple-400"></i>
                </div>
                <input type="password" id="password" name="password" required
                    class="block w-full pl-10 pr-3 py-3 border border-purple-500/30 rounded-lg bg-white bg-opacity-5 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-colors"
                    placeholder="Password">
            </div>

            <div id="errorMsg" class="hidden text-red-400 text-sm text-center font-semibold">
                Invalid credentials. Please try again.
            </div>

            <button type="submit" 
                class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg shadow-[0_0_15px_rgba(168,85,247,0.5)] transition-all flex justify-center items-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm text-gray-400 hover:text-purple-400 transition-colors">
                <i class="fa-solid fa-arrow-left mr-1"></i> Back to Portfolio
            </a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success! Save the JWT token to local storage
                    localStorage.setItem('adminToken', data.token);
                    // Redirect to dashboard (you'll need to create this page)
                    window.location.href = 'dashboard.html'; 
                } else {
                    // Show error message
                    errorMsg.classList.remove('hidden');
                    errorMsg.innerText = data.message || "Login failed.";
                }
            } catch (err) {
                console.error("Login error:", err);
                errorMsg.classList.remove('hidden');
                errorMsg.innerText = "Server error. Is the backend running?";
            }
        });
    </script>
</body>
</html>
