<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudhanshu Kumar - Developer Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-purple-900 min-h-screen font-sans overflow-x-hidden">

    <nav class="flex justify-between items-center py-6 px-10 text-white">
        <h1 class="text-2xl font-bold tracking-widest">PORT<span class="text-purple-400">FOLIO</span></h1>
        
        <div class="flex items-center gap-6">
            <a href="#" class="hover:text-purple-400 transition font-medium">Home</a>
            <a href="#" class="hover:text-purple-400 transition font-medium">Projects</a>
            <a href="#" class="hover:text-purple-400 transition font-medium">Resume</a>
            
            <div class="flex items-center gap-4 ml-4 text-xl border-l border-white/20 pl-6">
                <a href="#" class="hover:text-purple-400 transition"><i class="fa-brands fa-github"></i></a>
                <a href="#" class="hover:text-purple-400 transition"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#" class="hover:text-purple-400 transition"><i class="fa-solid fa-code"></i></a>
                <a href="#" class="hover:text-purple-400 transition"><i class="fa-brands fa-instagram"></i></a>
                <button onclick="toggleLoginModal()" class="hover:text-purple-400 transition ml-2">
                    <i class="fa-solid fa-shield-halved"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex flex-col md:flex-row justify-between items-center px-10 lg:px-24 py-12 gap-10">
        
        <div class="text-white w-full md:w-1/2">
            <div class="w-32 h-32 rounded-full border-4 border-purple-500/50 flex items-center justify-center bg-slate-800 shadow-[0_0_20px_rgba(168,85,247,0.4)] mb-6">
                <span class="text-4xl font-bold text-gray-200">SK</span>
            </div>

            <p class="text-purple-400 font-semibold tracking-widest mb-2 text-sm uppercase">Hello, I Am</p>
            <h2 class="text-5xl font-bold mb-4 text-white">Sudhanshu Kumar</h2>
            <h3 class="text-2xl text-blue-300 font-medium mb-6">Software Development Intern</h3>
            
            <div class="bg-white/10 border border-white/20 p-4 rounded-xl backdrop-blur-sm mb-8 inline-block">
                <p class="text-gray-300 text-sm flex items-start gap-3">
                    <i class="fa-solid fa-user-astronaut mt-1 text-purple-400"></i>
                    I am deeply interested in software development and am eager to<br>
                    continuously learn, grow, and build my technical skills in this field.
                </p>
            </div>
            
            <br>
            <button class="bg-gradient-to-r from-purple-500 to-blue-500 hover:from-purple-400 hover:to-blue-400 text-white font-bold py-3 px-6 rounded-full transition transform hover:-translate-y-1 shadow-[0_0_15px_rgba(168,85,247,0.5)]">
                <i class="fa-solid fa-file-lines mr-2"></i> View Resume
            </button>
        </div>

        <div class="w-full md:w-1/2 flex justify-center">
            <div class="bg-white/5 border border-white/10 p-8 rounded-3xl backdrop-blur-md w-full max-w-lg shadow-2xl">
                <h4 class="text-white text-center text-xl font-bold mb-6 flex justify-center items-center gap-2">
                    <i class="fa-solid fa-code"></i> Technical Skills
                </h4>
                
                <div class="flex justify-center items-center h-72 w-full relative">
                    <canvas id="skillsChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-[100] flex justify-center items-center backdrop-blur-sm">
        <div class="bg-slate-900 border border-purple-500/30 p-8 rounded-2xl shadow-2xl w-11/12 max-w-md relative">
            
            <button onclick="toggleLoginModal()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
            
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold tracking-wider text-white">ADMIN <span class="text-purple-400">LOGIN</span></h2>
            </div>

            <form id="loginForm" class="flex flex-col gap-5">
                <p id="loginErrorMessage" class="text-red-500 text-sm font-semibold text-center hidden"></p>

                <div>
                    <label class="text-gray-400 text-sm font-semibold mb-1 block">Username</label>
                    <input type="text" id="adminUsername" required placeholder="Enter username" 
                        class="w-full bg-slate-800 text-white px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-700 transition">
                </div>
                
                <div>
                    <label class="text-gray-400 text-sm font-semibold mb-1 block">Password</label>
                    <input type="password" id="adminPassword" required placeholder="Enter password" 
                        class="w-full bg-slate-800 text-white px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-700 transition">
                </div>

                <button type="submit" class="mt-2 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white font-bold py-3 px-4 rounded-lg transition transform hover:scale-105 shadow-lg">
                    Secure Login
                </button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
