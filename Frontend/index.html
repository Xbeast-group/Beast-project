<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Portfolio</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div id="login-section" class="card">
        <h2>Welcome! Sign In</h2>
        <input type="text" id="username" placeholder="Enter Username (e.g. rahul123)" />
        <input type="password" id="password" placeholder="Enter Password" />
        <input type="text" id="github-id" placeholder="Enter GitHub Username" />
        <button id="login-btn" class="btn">Login & View Portfolio</button>
    </div>

    <div id="portfolio-section" class="card" style="display: none;">
        <img id="profile-pic" src="" alt="Profile" style="width:100px; border-radius:50%; display:none;">
        
        <h1 id="user-name">Loading...</h1>
        <p id="user-bio">Fetching data from GitHub...</p>
        
        <div class="links">
            <a id="link-resume" href="#" class="btn">📄 Resume</a>
            <a id="link-linkedin" href="#" class="btn">💼 LinkedIn</a>
            <a id="link-github" href="#" target="_blank" class="btn">🐙 GitHub Profile</a>
        </div>
        
        <button id="logout-btn" class="btn" style="background: red; margin-top: 20px;">Logout</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
